<!doctype html>
<html>
  <head>
    <title>Question Editor</title>
  </head>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background-color: #013b3b;
    }

    #wrapper {
      /* background-color: #f4a4a4; */
      width: 55%;
      margin: auto;
      margin-top:10vh;
    }

    h1,
    label {
      font-family: sans-serif;
      color: #98f371
    }
    #question {
      width: 100%;
      height: 60px;
    }
    .answers {
      width: 100%;
      height: 40px;
    }

    /* CSS */
    .add-exp {
      background-image: linear-gradient(-180deg, #ff7e31, #e62c03);
      border-radius: 10px;
      box-shadow: #0000001a 0 6px 6px;
      color: #ffffff;
      cursor: pointer;
      font-family: sans-serif;
      font-size: 16px;
      height: 40px;
      line-height: 40px;
      outline: 1px;
      padding: 0 20px;
      text-align: center;
      touch-action: manipulation;
      user-select: none;
      width: 50%;
      border: 0;
      transition: box-shadow 0.2s;
    }

    .add-exp:hover {
      box-shadow: #fd4c0080 0 3px 8px;
    }
    .logo {
      width: 150px;
      position: absolute;
      top: 30px;
      left: 1300px;
    }
  </style>

  <body>
    <img src="image\qCLogo.png" alt="Our Logo" class="logo" />

    <div id="wrapper">
      <h1>The Question Maker</h1>

      <input id="question" placeholder="Question" />

      <br /><br />

      <input id="answer1" class="answers" placeholder="Answer 1" />

      <br /><br />

      <input id="answer2" class="answers" placeholder="Answer 2" />

      <br /><br />

      <input id="answer3" class="answers" placeholder="Answer 3" />

      <br /><br />

      <input id="answer4" class="answers" placeholder="Answer 4" />

      <br /><br />

      <label>Correct Answer (1-4)</label>

      <input id="correct" type="number" min="1" max="4" />

      <br /><br />

      <button onclick="addQuestion()" class="add-exp">
        Add Question
      </button>
      <br /><br />
      <button onclick="downloadJSON()" class="add-exp">
        Export JSON
      </button>

      <script src="editor.js"></script>
    </div>
  </body>
</html>
